<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Gradiente alinhado com o padrão visual do seu Navbar/Footer -->
    <linearGradient id="solvix-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  
  <!-- Fundo quadrado arredondado idêntico à logo do site -->
  <rect width="32" height="32" rx="8" fill="url(#solvix-grad)" />
  
  <!-- Iniciais "st" centralizadas -->
  <text x="50%" y="55%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="'Syne', 'Segoe UI', sans-serif" 
        font-weight="bold" 
        font-size="14">st</text>
</svg>
